<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprouts Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 
                         Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 12px;
            margin-bottom: 60px;
            color: #FFFFFF;
        }
        
        #status {
            font-size: 16px;
            font-weight: 400;
            color: #A0A0A0;
            margin-bottom: 24px;
            min-height: 24px;
            transition: color 200ms ease-in-out;
        }
        
        #status.win { color: #10B981; }
        #status.lose { color: #EF4444; }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        button {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            color: #A0A0A0;
            padding: 12px 32px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 150ms ease-in-out;
            font-family: inherit;
        }
        
        button:hover:not(:disabled) {
            background: #252525;
            color: #FFFFFF;
            border-color: #404040;
        }
        
        button:active:not(:disabled) {
            background: #303030;
            transform: translateY(1px);
        }
        
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        #canvas {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            cursor: default;
            display: block;
        }
        
        #canvas:hover {
            cursor: inherit;
        }
        
        .canvas-container {
            position: relative;
        }
        
        #debugInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 11px;
            color: #A0A0A0;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: none;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 16px;
            border-radius: 4px;
            border: 1px solid #2A2A2A;
            font-family: monospace;
            pointer-events: none;
            white-space: pre;
            line-height: 1.6;
        }
        
        #debugInfo.visible {
            display: block;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.visible {
            display: flex;
        }
        
        .modal-content {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            padding: 60px 80px;
            border-radius: 4px;
            text-align: center;
        }
        
        .modal-content h2 {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 40px;
            color: #FFFFFF;
        }
        
        .modal-content p {
            font-size: 18px;
            color: #A0A0A0;
            margin-bottom: 40px;
        }
        
        @media (max-width: 900px) {
            h1 {
                font-size: 32px;
                letter-spacing: 8px;
            }
            
            #canvas {
                width: 100%;
                height: auto;
            }
            
            .modal-content {
                padding: 40px 60px;
            }
        }
    </style>
</head>
<body>
    <h1>SPROUTS</h1>
    
    <div class="controls">
        <button onclick="newGame(2)">2 Nodes</button>
        <button onclick="newGame(3)">3 Nodes</button>
        <button onclick="newGame(4)">4 Nodes</button>
    </div>
    
    <div id="status">Initializing...</div>
    
    <div class="canvas-container">
        <canvas id="canvas" width="800" height="800"></canvas>
        <div id="debugInfo"></div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2 id="winnerText"></h2>
            <p>Game Over</p>
            <button onclick="closeModal(); newGame(3);">New Game</button>
        </div>
    </div>

    <script type="module">
        const GameMode = {
            IDLE: 'idle',
            DRAGGING: 'dragging',
            PLACING_NODE: 'placing',
            ANIMATING_AI: 'animating_ai'
        };

        let gameState = {
            mode: GameMode.IDLE,
            nodes: [],
            lines: [],
            activeNodes: new Set(),
            dragPath: [],
            lockedPath: [],
            placementDot: null,
            dragStartNode: null,
            dragEndNode: null,
            hoveredNode: null,
            animatingLine: null,
            animationProgress: 0,
            debugMode: false,
            gameOver: false
        };

        let canvas, ctx;
        let worker = null;
        let pendingCallbacks = new Map();
        let callbackId = 0;

        function workerCall(type, data = {}) {
            return new Promise((resolve) => {
                const id = callbackId++;
                pendingCallbacks.set(id, { resolve });
                worker.postMessage({ type, data, id });
            });
        }

        function handleWorkerMessage(e) {
            const { id, ...payload } = e.data;
            if (pendingCallbacks.has(id)) {
                pendingCallbacks.get(id).resolve(payload);
                pendingCallbacks.delete(id);
            }
        }

        async function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');

            worker = new Worker('./ai-worker.js', { type: 'module' });
            worker.onmessage = handleWorkerMessage;
            worker.onerror = (error) => {
                console.error('Worker error:', error);
                setStatus('Failed to load game. Please check console.', 'lose');
            };

            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('click', onClick);

            requestAnimationFrame(render);

            try {
                await workerCall('init', { nodeCount: 3 });
                await updateGameState();
                setStatus('Draw a line between two nodes to make your move');
            } catch (error) {
                console.error('Failed to initialize:', error);
                setStatus('Failed to load game. Please check console.', 'lose');
            }
        }

        async function newGame(nodeCount) {
            await workerCall('init', { nodeCount });
            await updateGameState();
            gameState.mode = GameMode.IDLE;
            gameState.dragPath = [];
            gameState.lockedPath = [];
            gameState.placementDot = null;
            gameState.gameOver = false;
            closeModal();
            setStatus('Draw a line between two nodes to make your move');
        }

        function healPath(points) {
            if (points.length < 4) return points;
            const healed = [];
            healed.push(points[0]);
            for (let i = 1; i < points.length; i++) {
                const current = points[i];
                for (let j = 0; j < healed.length - 2; j++) {
                    if (segmentsIntersect(healed[healed.length - 1], current, healed[j], healed[j + 1])) {
                        const trimmed = healed.slice(0, j + 2);
                        trimmed.push(current);
                        return healPath(trimmed);
                    }
                }
                healed.push(current);
            }
            return healed;
        }

        function segmentsIntersect(a1, a2, b1, b2) {
            const ccw = (a, b, c) => (c.y - a.y) * (b.x - a.x) > (b.y - a.y) * (c.x - a.x);
            return ccw(a1, b1, b2) !== ccw(a2, b1, b2) && ccw(a1, a2, b1) !== ccw(a1, a2, b2);
        }

        async function updateGameState() {
            const { state } = await workerCall('get_state');
            let idx = 0;

            const nodeCount = state[idx++];
            gameState.nodes = [];
            for (let i = 0; i < nodeCount; i++) {
                gameState.nodes.push({
                    id: state[idx++],
                    position: { x: state[idx++], y: state[idx++] },
                    connectionCount: state[idx++]
                });
            }

            const lineCount = state[idx++];
            gameState.lines = [];
            for (let i = 0; i < lineCount; i++) {
                const id = state[idx++];
                const from = state[idx++];
                const to = state[idx++];
                const pointCount = state[idx++];
                const polyline = [];
                for (let j = 0; j < pointCount; j++) {
                    polyline.push({ x: state[idx++], y: state[idx++] });
                }
                const newNodePos = { x: state[idx++], y: state[idx++] };
                const player = state[idx++];
                gameState.lines.push({ id, from, to, polyline, newNodePos, player });
            }

            const { activeNodes } = await workerCall('get_active_nodes');
            gameState.activeNodes = new Set(activeNodes);

            const { gameOver } = await workerCall('is_game_over');
            if (gameOver) {
                gameState.gameOver = true;
                showGameOver();
            }
            
            // Refresh skeleton debug if in debug mode
            if (gameState.debugMode) {
                await refreshSkeletonDebug();
            }
        }

        function setStatus(message, type = '') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = type;
        }

        function onMouseDown(e) {
            if (gameState.mode !== GameMode.IDLE) return;
            if (gameState.gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            const node = findNodeAt(x, y);
            if (node && gameState.activeNodes.has(node.id)) {
                gameState.mode = GameMode.DRAGGING;
                gameState.dragStartNode = node.id;
                gameState.dragPath = [{ x: node.position.x, y: node.position.y }];
                setStatus('Drag to draw your path...');
            }
        }

        async function onMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            const node = findNodeAt(x, y);
            gameState.hoveredNode = node ? node.id : null;

            if (gameState.mode === GameMode.DRAGGING) {
                const last = gameState.dragPath[gameState.dragPath.length - 1];
                const dx = x - last.x;
                const dy = y - last.y;
                if (dx * dx + dy * dy > 16) {
                    gameState.dragPath.push({ x, y });
                    gameState.dragPath = healPath(gameState.dragPath);
                }
            } else if (gameState.mode === GameMode.PLACING_NODE) {
                const pathData = gameState.lockedPath.flatMap(p => [p.x, p.y]);
                const { point } = await workerCall('get_closest_point', { pathData, x, y });
                const closest = { x: point[0], y: point[1] };

                const { valid } = await workerCall('validate_placement', { 
                    pathData, 
                    newNodeX: closest.x, 
                    newNodeY: closest.y 
                });

                gameState.placementDot = {
                    position: closest,
                    valid
                };
            }
        }

        function onMouseUp(e) {
            if (gameState.mode !== GameMode.DRAGGING) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            const endNode = findNodeAt(x, y);
            if (!endNode || !gameState.activeNodes.has(endNode.id)) {
                gameState.mode = GameMode.IDLE;
                gameState.dragPath = [];
                setStatus('Must end on an active (blue) node', 'lose');
                return;
            }

            const snappedPath = [...gameState.dragPath];
            snappedPath[snappedPath.length - 1] = { x: endNode.position.x, y: endNode.position.y };

            gameState.lockedPath = snappedPath;
            gameState.dragEndNode = endNode.id;
            gameState.mode = GameMode.PLACING_NODE;
            setStatus('Click on the curve to place the new node', 'win');
        }

        async function onClick(e) {
            if (gameState.mode !== GameMode.PLACING_NODE) return;

            if (!gameState.placementDot || !gameState.placementDot.valid) {
                setStatus('Invalid placement location', 'lose');
                return;
            }

            const pathData = gameState.lockedPath.flatMap(p => [p.x, p.y]);
            const newPos = gameState.placementDot.position;

            await workerCall('apply_move', {
                fromNode: gameState.dragStartNode,
                toNode: gameState.dragEndNode,
                pathData,
                newNodeX: newPos.x,
                newNodeY: newPos.y
            });

            await updateGameState();
            gameState.mode = GameMode.IDLE;
            gameState.dragPath = [];
            gameState.lockedPath = [];
            gameState.placementDot = null;
            gameState.dragEndNode = null;

            if (!gameState.gameOver) {
                setStatus('AI is thinking...');
                performAIMove();
            }
        }

        async function performAIMove() {
            const { move: aiMoveData } = await workerCall('get_ai_move');

            if (aiMoveData.length === 0) {
                const { classification: classDebug } = await workerCall('get_classification_debug');
                let idx = 0;
                
                const activeCount = classDebug[idx++];
                const activeNodes = [];
                for (let i = 0; i < activeCount; i++) {
                    activeNodes.push(classDebug[idx++]);
                }
                
                const pairsCount = classDebug[idx++];
                const legalPairs = [];
                for (let i = 0; i < pairsCount; i++) {
                    legalPairs.push([classDebug[idx++], classDebug[idx++]]);
                }
                
                const loopsCount = classDebug[idx++];
                const selfLoops = [];
                for (let i = 0; i < loopsCount; i++) {
                    selfLoops.push(classDebug[idx++]);
                }
                
                gameState.gameOver = true;
                showGameOver();
                return;
            }

            let idx = 0;
            const fromNode = aiMoveData[idx++];
            const toNode = aiMoveData[idx++];
            const pointCount = aiMoveData[idx++];
            const path = [];
            for (let i = 0; i < pointCount; i++) {
                path.push({ x: aiMoveData[idx++], y: aiMoveData[idx++] });
            }
            const newPos = { x: aiMoveData[idx++], y: aiMoveData[idx++] };

            gameState.mode = GameMode.ANIMATING_AI;
            gameState.animatingLine = { path, newPos };
            gameState.animationProgress = 0;

            const animationDuration = 500;
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                gameState.animationProgress = Math.min(elapsed / animationDuration, 1.0);

                if (gameState.animationProgress < 1.0) {
                    requestAnimationFrame(animate);
                } else {
                    applyAIMove(fromNode, toNode, path, newPos);
                }
            }

            requestAnimationFrame(animate);
        }

        async function applyAIMove(fromNode, toNode, path, newPos) {
            const pathData = path.flatMap(p => [p.x, p.y]);
            await workerCall('apply_move', {
                fromNode,
                toNode,
                pathData,
                newNodeX: newPos.x,
                newNodeY: newPos.y
            });
            
            await updateGameState();
            gameState.mode = GameMode.IDLE;
            gameState.animatingLine = null;

            if (!gameState.gameOver) {
                setStatus('Your turn! Draw a line between two nodes');
            }
        }

        function findNodeAt(x, y) {
            const threshold = 15;
            for (const node of gameState.nodes) {
                const dx = x - node.position.x;
                const dy = y - node.position.y;
                if (dx * dx + dy * dy < threshold * threshold) {
                    return node;
                }
            }
            return null;
        }

        let skeletonDebugCache = null;

        async function refreshSkeletonDebug() {
            if (gameState.debugMode && worker) {
                const { skeleton } = await workerCall('get_skeleton_debug');
                skeletonDebugCache = new ImageData(new Uint8ClampedArray(skeleton), 800, 800);
            }
        }

        async function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#1A1A1A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState.debugMode && skeletonDebugCache) {
                ctx.globalAlpha = 0.15;
                ctx.putImageData(skeletonDebugCache, 0, 0);
                ctx.globalAlpha = 1.0;
            }

            for (const line of gameState.lines) {
                ctx.strokeStyle = line.player === 0 ? '#2C2C2C' : '#EF4444';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.beginPath();
                ctx.moveTo(line.polyline[0].x, line.polyline[0].y);
                for (let i = 1; i < line.polyline.length; i++) {
                    ctx.lineTo(line.polyline[i].x, line.polyline[i].y);
                }
                ctx.stroke();
            }

            if (gameState.mode === GameMode.DRAGGING && gameState.dragPath.length > 1) {
                ctx.strokeStyle = 'rgba(44, 44, 44, 0.45)';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.beginPath();
                ctx.moveTo(gameState.dragPath[0].x, gameState.dragPath[0].y);
                for (let i = 1; i < gameState.dragPath.length; i++) {
                    ctx.lineTo(gameState.dragPath[i].x, gameState.dragPath[i].y);
                }
                ctx.stroke();
            }

            if (gameState.mode === GameMode.PLACING_NODE) {
                ctx.strokeStyle = '#2C2C2C';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.beginPath();
                ctx.moveTo(gameState.lockedPath[0].x, gameState.lockedPath[0].y);
                for (let i = 1; i < gameState.lockedPath.length; i++) {
                    ctx.lineTo(gameState.lockedPath[i].x, gameState.lockedPath[i].y);
                }
                ctx.stroke();

                if (gameState.placementDot) {
                    ctx.fillStyle = gameState.placementDot.valid ? '#10B981' : '#EF4444';
                    ctx.beginPath();
                    ctx.arc(
                        gameState.placementDot.position.x,
                        gameState.placementDot.position.y,
                        5,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                }
            }

            for (const node of gameState.nodes) {
                const isActive = gameState.activeNodes.has(node.id);
                const isHovered = gameState.hoveredNode === node.id;

                const radius = isHovered ? 9 : 6;
                
                let fillColor, strokeColor;
                if (gameState.debugMode) {
                    if (isActive) {
                        fillColor = '#10B981';
                        strokeColor = '#059669';
                    } else {
                        fillColor = '#EF4444';
                        strokeColor = '#DC2626';
                    }
                } else {
                    fillColor = isActive ? '#3B82F6' : '#BDBDBD';
                    strokeColor = '#FFFFFF';
                }

                if (isHovered && isActive) {
                    ctx.shadowColor = gameState.debugMode ? '#10B981' : '#60A5FA';
                    ctx.shadowBlur = 15;
                }

                ctx.fillStyle = fillColor;
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.arc(node.position.x, node.position.y, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.shadowBlur = 0;
                
                if (gameState.debugMode) {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = 'bold 10px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.connectionCount.toString(), node.position.x, node.position.y);
                }
            }

            if (gameState.mode === GameMode.ANIMATING_AI) {
                const anim = gameState.animatingLine;
                const progress = gameState.animationProgress;

                const visibleLength = Math.floor(progress * anim.path.length);
                if (visibleLength > 1) {
                    ctx.strokeStyle = '#EF4444';
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    ctx.beginPath();
                    ctx.moveTo(anim.path[0].x, anim.path[0].y);
                    for (let i = 1; i < visibleLength; i++) {
                        ctx.lineTo(anim.path[i].x, anim.path[i].y);
                    }
                    ctx.stroke();
                }

                if (progress > 0.75) {
                    const nodeProgress = (progress - 0.75) * 4;
                    const scale = easeOutElastic(nodeProgress);

                    ctx.globalAlpha = nodeProgress;
                    ctx.fillStyle = '#EF4444';
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 2;

                    ctx.beginPath();
                    ctx.arc(anim.newPos.x, anim.newPos.y, 6 * scale, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    ctx.globalAlpha = 1;
                }
            }

            if (gameState.debugMode) {
                const debugInfo = document.getElementById('debugInfo');
                debugInfo.classList.add('visible');
                
                const activeCount = gameState.activeNodes.size;
                const deadCount = gameState.nodes.length - activeCount;
                const totalConnections = gameState.nodes.reduce((sum, n) => sum + n.connectionCount, 0);
                
                debugInfo.textContent = `
Mode: ${gameState.mode}
Nodes: ${gameState.nodes.length} (${activeCount} active, ${deadCount} dead)
Lines: ${gameState.lines.length}
Total Connections: ${totalConnections}

Node Colors:
  GREEN = Active (can move)
  RED = Dead (isolated or 3 connections)
  Number = Connection count
                `.trim();
            } else {
                document.getElementById('debugInfo').classList.remove('visible');
            }

            requestAnimationFrame(render);
        }

        function easeOutElastic(t) {
            const c4 = (2 * Math.PI) / 3;
            return t === 0 ? 0 : t === 1 ? 1
                : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
        }

        function toggleDebug() {
            gameState.debugMode = !gameState.debugMode;
            if (gameState.debugMode) {
                refreshSkeletonDebug();
            } else {
                skeletonDebugCache = null;
            }
        }

        function showGameOver() {
            const modal = document.getElementById('gameOverModal');
            const winnerText = document.getElementById('winnerText');

            const lastMove = gameState.lines[gameState.lines.length - 1];
            const winner = lastMove ? (lastMove.player === 0 ? 'YOU WIN' : 'AI WINS') : 'DRAW';

            winnerText.textContent = winner;
            modal.classList.add('visible');
        }

        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('visible');
        }

        window.newGame = newGame;
        window.toggleDebug = toggleDebug;
        window.closeModal = closeModal;

        init();
    </script>
</body>
</html>
