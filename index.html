<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sprouts Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0A0A0A;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 
                         Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* Lock body height */
            padding: 10px;
            overflow: hidden; /* Prevent body scroll */
            touch-action: manipulation;
        }
        
        h1 {
            font-size: clamp(20px, 5vh, 40px);
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 10px;
            color: #FFFFFF;
            flex-shrink: 0;
        }
        
        #status {
            font-size: 14px;
            color: #A0A0A0;
            margin-bottom: 10px;
            min-height: 20px;
            text-align: center;
            flex-shrink: 0;
        }
        
        #status.win { color: #10B981; }
        #status.lose { color: #EF4444; }
        
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
            flex-shrink: 0;
        }
        
        button {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            color: #A0A0A0;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 150ms ease-in-out;
        }
        
        button:hover:not(:disabled) {
            background: #252525;
            color: #FFFFFF;
        }

        button.confirm-btn {
            background: #10B981;
            color: white;
            border-color: #059669;
        }
        
        /* The "Fit to Window" Logic */
        .canvas-container {
            position: relative;
            flex-grow: 1; /* Take up remaining space */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 0; /* Allow container to shrink below content size */
        }

        #canvas {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            display: block;
            touch-action: none;
            /* Scale based on both width and height constraints */
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            aspect-ratio: 1 / 1;
        }

        #mobileOverlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 12px;
            z-index: 10;
            background: rgba(10, 10, 10, 0.9);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2A2A2A;
        }

        #mobileOverlay.visible { display: flex; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.visible { display: flex; }
        
        .modal-content {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            padding: 40px 20px;
            border-radius: 4px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h1>SPROUTS</h1>
    
    <div class="controls">
        <button onclick="newGame(2)">2 Nodes</button>
        <button onclick="newGame(3)">3 Nodes</button>
        <button onclick="newGame(4)">4 Nodes</button>
    </div>
    
    <div id="status">Initializing...</div>
    
    <div class="canvas-container">
        <canvas id="canvas" width="800" height="800"></canvas>
        <div id="mobileOverlay">
            <button onclick="cancelPlacement()">Cancel</button>
            <button class="confirm-btn" onclick="confirmMove()">Confirm Move</button>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2 id="winnerText" style="letter-spacing: 4px; margin-bottom: 20px;"></h2>
            <p style="margin-bottom: 30px; color: #A0A0A0;">Game Over</p>
            <button onclick="closeModal(); newGame(3);">New Game</button>
        </div>
    </div>

    <script type="module">
        const GameMode = {
            IDLE: 'idle',
            DRAGGING: 'dragging',
            PLACING_NODE: 'placing',
            ANIMATING_AI: 'animating_ai'
        };

        let gameState = {
            mode: GameMode.IDLE,
            nodes: [],
            lines: [],
            activeNodes: new Set(),
            dragPath: [],
            lockedPath: [],
            placementDot: null,
            dragStartNode: null,
            dragEndNode: null,
            hoveredNode: null,
            animatingLine: null,
            animationProgress: 0,
            gameOver: false,
            isTouchDevice: false
        };

        let canvas, ctx;
        let worker = null;
        let pendingCallbacks = new Map();
        let callbackId = 0;

        function workerCall(type, data = {}) {
            return new Promise((resolve) => {
                const id = callbackId++;
                pendingCallbacks.set(id, { resolve });
                worker.postMessage({ type, data, id });
            });
        }

        function handleWorkerMessage(e) {
            const { id, ...payload } = e.data;
            if (pendingCallbacks.has(id)) {
                pendingCallbacks.get(id).resolve(payload);
                pendingCallbacks.delete(id);
            }
        }

        async function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');

            worker = new Worker('./ai-worker.js', { type: 'module' });
            worker.onmessage = handleWorkerMessage;

            // Input handlers
            canvas.addEventListener('mousedown', (e) => {
                if(gameState.isTouchDevice) return;
                handleStart(e.clientX, e.clientY);
            });
            canvas.addEventListener('mousemove', (e) => {
                if(gameState.isTouchDevice) return;
                handleMove(e.clientX, e.clientY);
            });
            canvas.addEventListener('mouseup', (e) => {
                if(gameState.isTouchDevice) return;
                handleEnd(e.clientX, e.clientY);
            });
            canvas.addEventListener('click', (e) => {
                if(gameState.isTouchDevice) return;
                handleDesktopClick();
            });

            canvas.addEventListener('touchstart', (e) => {
                gameState.isTouchDevice = true;
                e.preventDefault();
                handleStart(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                handleMove(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            }, { passive: false });

            requestAnimationFrame(render);
            await workerCall('init', { nodeCount: 3 });
            await updateGameState();
            setStatus('Draw a line between two nodes');
        }

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleStart(clientX, clientY) {
            if (gameState.mode !== GameMode.IDLE || gameState.gameOver) return;
            const { x, y } = getCanvasCoords(clientX, clientY);
            const node = findNodeAt(x, y);
            if (node && gameState.activeNodes.has(node.id)) {
                gameState.mode = GameMode.DRAGGING;
                gameState.dragStartNode = node.id;
                gameState.dragPath = [{ x: node.position.x, y: node.position.y }];
            }
        }

        async function handleMove(clientX, clientY) {
            const { x, y } = getCanvasCoords(clientX, clientY);
            const node = findNodeAt(x, y);
            gameState.hoveredNode = node ? node.id : null;

            if (gameState.mode === GameMode.DRAGGING) {
                const last = gameState.dragPath[gameState.dragPath.length - 1];
                if (Math.hypot(x - last.x, y - last.y) > 5) {
                    gameState.dragPath.push({ x, y });
                    gameState.dragPath = healPath(gameState.dragPath);
                }
            } else if (gameState.mode === GameMode.PLACING_NODE) {
                const pathData = gameState.lockedPath.flatMap(p => [p.x, p.y]);
                const { point } = await workerCall('get_closest_point', { pathData, x, y });
                const closest = { x: point[0], y: point[1] };
                
                const snapDist = gameState.isTouchDevice ? 60 : 30;
                if (Math.hypot(x - closest.x, y - closest.y) < snapDist) {
                    const { valid } = await workerCall('validate_placement', { 
                        pathData, newNodeX: closest.x, newNodeY: closest.y 
                    });
                    gameState.placementDot = { position: closest, valid };
                }
            }
        }

        function handleEnd(clientX, clientY) {
            if (gameState.mode !== GameMode.DRAGGING) return;
            const { x, y } = getCanvasCoords(clientX, clientY);
            const endNode = findNodeAt(x, y);

            if (!endNode || !gameState.activeNodes.has(endNode.id)) {
                gameState.mode = GameMode.IDLE;
                gameState.dragPath = [];
                setStatus('Connect to a valid node', 'lose');
                return;
            }

            gameState.lockedPath = [...gameState.dragPath];
            gameState.lockedPath[gameState.lockedPath.length - 1] = { x: endNode.position.x, y: endNode.position.y };
            gameState.dragEndNode = endNode.id;
            gameState.mode = GameMode.PLACING_NODE;
            
            if (gameState.isTouchDevice) {
                document.getElementById('mobileOverlay').classList.add('visible');
                setStatus('Slide finger along curve to place node');
            } else {
                setStatus('Click on the curve to place node', 'win');
            }
        }

        async function handleDesktopClick() {
            if (gameState.mode === GameMode.PLACING_NODE && !gameState.isTouchDevice) {
                await executeMove();
            }
        }

        window.confirmMove = async () => {
            if (gameState.isTouchDevice) await executeMove();
        };

        async function executeMove() {
            if (!gameState.placementDot || !gameState.placementDot.valid) {
                setStatus('Select a valid spot on the line', 'lose');
                return;
            }
            const pathData = gameState.lockedPath.flatMap(p => [p.x, p.y]);
            const newPos = gameState.placementDot.position;
            document.getElementById('mobileOverlay').classList.remove('visible');
            await workerCall('apply_move', {
                fromNode: gameState.dragStartNode, toNode: gameState.dragEndNode,
                pathData, newNodeX: newPos.x, newNodeY: newPos.y
            });
            await updateGameState();
            gameState.mode = GameMode.IDLE;
            gameState.dragPath = [];
            gameState.lockedPath = [];
            gameState.placementDot = null;
            if (!gameState.gameOver) {
                setStatus('AI is thinking...');
                performAIMove();
            }
        }

        window.cancelPlacement = () => {
            gameState.mode = GameMode.IDLE;
            gameState.dragPath = [];
            gameState.lockedPath = [];
            gameState.placementDot = null;
            document.getElementById('mobileOverlay').classList.remove('visible');
            setStatus('Move cancelled');
        };

        function healPath(points) {
            if (points.length < 4) return points;
            const healed = [points[0]];
            for (let i = 1; i < points.length; i++) {
                const current = points[i];
                for (let j = 0; j < healed.length - 2; j++) {
                    if (segmentsIntersect(healed[healed.length - 1], current, healed[j], healed[j + 1])) {
                        return healPath([...healed.slice(0, j + 2), current]);
                    }
                }
                healed.push(current);
            }
            return healed;
        }

        function segmentsIntersect(a1, a2, b1, b2) {
            const ccw = (a, b, c) => (c.y - a.y) * (b.x - a.x) > (b.y - a.y) * (c.x - a.x);
            return ccw(a1, b1, b2) !== ccw(a2, b1, b2) && ccw(a1, a2, b1) !== ccw(a1, a2, b2);
        }

        async function updateGameState() {
            const { state } = await workerCall('get_state');
            let idx = 0;
            const nodeCount = state[idx++];
            gameState.nodes = [];
            for (let i = 0; i < nodeCount; i++) {
                gameState.nodes.push({
                    id: state[idx++],
                    position: { x: state[idx++], y: state[idx++] },
                    connectionCount: state[idx++]
                });
            }
            const lineCount = state[idx++];
            gameState.lines = [];
            for (let i = 0; i < lineCount; i++) {
                const id = state[idx++];
                const from = state[idx++];
                const to = state[idx++];
                const pointCount = state[idx++];
                const polyline = [];
                for (let j = 0; j < pointCount; j++) polyline.push({ x: state[idx++], y: state[idx++] });
                const newNodePos = { x: state[idx++], y: state[idx++] };
                const player = state[idx++];
                gameState.lines.push({ id, from, to, polyline, newNodePos, player });
            }
            const { activeNodes } = await workerCall('get_active_nodes');
            gameState.activeNodes = new Set(activeNodes);
            const { gameOver } = await workerCall('is_game_over');
            if (gameOver) {
                gameState.gameOver = true;
                showGameOver();
            }
        }

        async function performAIMove() {
            const { move: aiMoveData } = await workerCall('get_ai_move');
            if (aiMoveData.length === 0) {
                gameState.gameOver = true;
                showGameOver();
                return;
            }
            let idx = 0;
            const fromNode = aiMoveData[idx++];
            const toNode = aiMoveData[idx++];
            const pointCount = aiMoveData[idx++];
            const path = [];
            for (let i = 0; i < pointCount; i++) path.push({ x: aiMoveData[idx++], y: aiMoveData[idx++] });
            const newPos = { x: aiMoveData[idx++], y: aiMoveData[idx++] };
            gameState.mode = GameMode.ANIMATING_AI;
            gameState.animatingLine = { path, newPos };
            gameState.animationProgress = 0;
            const startTime = performance.now();
            function animate(currentTime) {
                gameState.animationProgress = Math.min((currentTime - startTime) / 500, 1.0);
                if (gameState.animationProgress < 1.0) requestAnimationFrame(animate);
                else finishAIMove(fromNode, toNode, path, newPos);
            }
            requestAnimationFrame(animate);
        }

        async function finishAIMove(fromNode, toNode, path, newPos) {
            await workerCall('apply_move', {
                fromNode, toNode, pathData: path.flatMap(p => [p.x, p.y]),
                newNodeX: newPos.x, newNodeY: newPos.y
            });
            await updateGameState();
            gameState.mode = GameMode.IDLE;
            gameState.animatingLine = null;
            if (!gameState.gameOver) setStatus('Your turn!');
        }

        function findNodeAt(x, y) {
            const threshold = gameState.isTouchDevice ? 25 : 15;
            return gameState.nodes.find(n => Math.hypot(x - n.position.x, y - n.position.y) < threshold) || null;
        }

        function render() {
            ctx.fillStyle = '#1A1A1A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (const line of gameState.lines) {
                ctx.strokeStyle = line.player === 0 ? '#444' : '#EF4444';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(line.polyline[0].x, line.polyline[0].y);
                for (let i = 1; i < line.polyline.length; i++) ctx.lineTo(line.polyline[i].x, line.polyline[i].y);
                ctx.stroke();
            }
            const activePath = gameState.mode === GameMode.DRAGGING ? gameState.dragPath : 
                               gameState.mode === GameMode.PLACING_NODE ? gameState.lockedPath : null;
            if (activePath && activePath.length > 1) {
                ctx.strokeStyle = '#3B82F6';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(activePath[0].x, activePath[0].y);
                for (let i = 1; i < activePath.length; i++) ctx.lineTo(activePath[i].x, activePath[i].y);
                ctx.stroke();
            }
            if (gameState.mode === GameMode.PLACING_NODE && gameState.placementDot) {
                ctx.fillStyle = gameState.placementDot.valid ? '#10B981' : '#EF4444';
                ctx.beginPath();
                ctx.arc(gameState.placementDot.position.x, gameState.placementDot.position.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
            for (const node of gameState.nodes) {
                const isActive = gameState.activeNodes.has(node.id);
                ctx.fillStyle = isActive ? '#3B82F6' : '#555';
                ctx.strokeStyle = '#FFF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(node.position.x, node.position.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
            if (gameState.mode === GameMode.ANIMATING_AI && gameState.animatingLine) {
                const anim = gameState.animatingLine;
                const len = Math.floor(gameState.animationProgress * anim.path.length);
                if (len > 1) {
                    ctx.strokeStyle = '#EF4444'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(anim.path[0].x, anim.path[0].y);
                    for (let i = 1; i < len; i++) ctx.lineTo(anim.path[i].x, anim.path[i].y);
                    ctx.stroke();
                }
            }
            requestAnimationFrame(render);
        }

        function setStatus(msg, type = '') {
            const el = document.getElementById('status');
            el.textContent = msg; el.className = type;
        }

        function showGameOver() {
            const lastMove = gameState.lines[gameState.lines.length - 1];
            document.getElementById('winnerText').textContent = lastMove?.player === 0 ? 'YOU WIN' : 'AI WINS';
            document.getElementById('gameOverModal').classList.add('visible');
        }

        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('visible');
        }

        window.newGame = (n) => {
            workerCall('init', { nodeCount: n }).then(() => {
                updateGameState();
                gameState.mode = GameMode.IDLE;
                gameState.gameOver = false;
                closeModal();
                setStatus('Connect two nodes');
            });
        };

        window.closeModal = closeModal;
        init();
    </script>
</body>
</html>
